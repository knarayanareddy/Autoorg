name: Health Check
description: Run smoke tests against a running AutoOrg instance.

inputs:
  api-url:
    description: AutoOrg API base URL
    required: false
    default: http://localhost:3001
  timeout-seconds:
    description: Total timeout for health check
    required: false
    default: '60'

runs:
  using: composite
  steps:
    - name: Wait for API
      shell: bash
      run: |
        if [ -z "${{ inputs.api-url }}" ]; then
          echo "❌ Error: api-url input is empty. Check your workflow variables."
          exit 1
        fi
        echo "Probing API at ${{ inputs.api-url }}..."
        for i in $(seq 1 ${{ inputs.timeout-seconds }}); do
          if curl -sf ${{ inputs.api-url }}/health > /dev/null 2>&1 || curl -sf ${{ inputs.api-url }}/api/health > /dev/null 2>&1; then
            echo "✅ API is up"
            exit 0
          fi
          if [ $((i % 10)) -eq 0 ]; then
             echo "... still waiting ($i/${{ inputs.timeout-seconds }}s) ..."
          fi
          sleep 1
        done
        echo "❌ API did not come up in time at ${{ inputs.api-url }}"
        exit 1

    - name: Run health check script
      shell: bash
      env:
        AUTOORG_API_URL: ${{ inputs.api-url }}
      run: bun run scripts/ci/health-check.ts
